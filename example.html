<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS and Its Types</title>
    <link rel="stylesheet" href="/style.css">
    <style>
       body{
        background-color: aqua;
       }
    </style>
</head>
<body>
    <h1>CSS (Cascading Style Sheets)</h1>
    <h2>Types</h2>

    <h4 style="color: red;">Inline CSS</h4>
    <h4>Internal CSS(the background color aqua is done using internal css)</h4>
    <h4>External CSS</h4>
    <div class="div1">
        this is div1
    </div>
    <div id="div2">
        this is div2
    </div>
</body>
</html>
